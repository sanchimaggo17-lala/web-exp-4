<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta name="description" content="Personal portfolio of Sanchi Maggo">
<meta name="keywords" content="portfolio, web development, student">
<meta name="author" content="Sanchi Maggo">

<title>SEO Portfolio</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
}

/* Navbar */
nav {
  text-align: center;
  padding: 15px;
  background: rgba(0,0,0,0.3);
}

nav a {
  color: white;
  margin: 15px;
  text-decoration: none;
  font-weight: bold;
}

/* Hero */
header {
  text-align: center;
  padding: 50px 20px;
}

header h1 {
  font-size: 40px;
}

header p {
  opacity: 0.8;
}

/* Cards */
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  color: black;
  padding: 25px;
  margin: 20px 0;
  border-radius: 15px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
}

/* Form */
input {
  width: 90%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

button {
  padding: 10px 15px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 5px;
}

/* Footer */
footer {
  text-align: center;
  padding: 15px;
  background: rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<header>
<h1>Sanchi Maggo ✨</h1>
<p>IT Student | Web Developer</p>
</header>

<nav>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</nav>

<main class="container">

<section id="about" class="card">
<h2>About Me</h2>
<p>I am an IT student passionate about web development and building modern user-friendly websites.</p>
</section>

<section id="projects" class="card">
<h2>Projects</h2>
<ul>
<li>Portfolio Website</li>
<li>To-Do App</li>
</ul>
</section>

<section id="contact" class="card">
<h2>Contact</h2>

<form>
<label>Name</label><br>
<input type="text"><br>

<label>Email</label><br>
<input type="email"><br><br>

<button>Submit</button>
</form>

</section>

</main>

<footer>
<p>© 2026 Sanchi Maggo</p>
</footer>

</body>
</html>
